services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pingpong
      POSTGRES_PASSWORD: pingpong
      POSTGRES_DB: pingpong
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingpong"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    # The image's default CMD is the production one (no reload). For local dev we
    # override it here to get hot-reload, since the source is bind-mounted below.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://pingpong:pingpong@db:5432/pingpong
      # Admin login (F6). Generate a hash with:
      #   python -m app.auth hash "your-password"
      # These dev defaults unlock with the password "changeme" — replace them.
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-insecure-session-secret-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db-data:
